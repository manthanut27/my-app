name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: my-app
      - name: Lint
        run: npm run lint
        working-directory: my-app
      - name: Test
        run: npm run test
        working-directory: my-app
